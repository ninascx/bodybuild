<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiftLog 视觉效果演示</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-primary-700: #0f6f68;
      --color-primary-600: #0b7f76;
      --color-primary-500: #0f9488;
      --motion-instant: 80ms;
      --motion-fast: 120ms;
      --motion-base: 180ms;
      --motion-slow: 240ms;
      --ease-spring: cubic-bezier(0.68, -0.55, 0.265, 1.55);
      --ease-bounce: cubic-bezier(0.68, -0.6, 0.32, 1.6);
      --ease-elastic: cubic-bezier(0.175, 0.885, 0.32, 1.275);
      --ease-momentum: cubic-bezier(0.4, 0, 0.1, 1);
      --ease-out-smooth: cubic-bezier(0.22, 1, 0.36, 1);
      --shadow-sm: 0 1px 3px 0 rgb(15 23 42 / 0.08), 0 1px 2px -1px rgb(15 23 42 / 0.08);
      --shadow-md: 0 4px 6px -1px rgb(15 23 42 / 0.08), 0 2px 4px -2px rgb(15 23 42 / 0.08);
      --shadow-lg: 0 10px 15px -3px rgb(15 23 42 / 0.08), 0 4px 6px -4px rgb(15 23 42 / 0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 800px;
      width: 100%;
    }

    h1 {
      color: white;
      text-align: center;
      margin-bottom: 2rem;
      font-size: 2.5rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .demo-section {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 1rem;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .demo-section h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: #1e293b;
    }

    .demo-section p {
      color: #64748b;
      margin-bottom: 1.5rem;
    }

    /* 按钮演示 */
    .button-demo {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition:
        transform var(--motion-fast) var(--ease-spring),
        background var(--motion-base) var(--ease-out-smooth),
        box-shadow var(--motion-base) var(--ease-out-smooth);
    }

    .btn-primary {
      background: var(--color-primary-700);
      color: white;
    }

    .btn-primary:hover {
      background: var(--color-primary-600);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-primary:active {
      transform: scale(0.96);
      transition-duration: var(--motion-instant);
    }

    .btn-success {
      background: #10b981;
      color: white;
    }

    .btn-success:hover {
      background: #059669;
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-success:active {
      animation: celebrate 600ms var(--ease-spring) both;
    }

    @keyframes celebrate {
      0% {
        transform: scale(1) rotate(0deg);
        box-shadow: 0 0 0 0 rgb(16 185 129 / 0);
      }
      15% {
        transform: scale(1.1) rotate(-3deg);
        box-shadow: 0 0 0 8px rgb(16 185 129 / 0.3);
      }
      30% {
        transform: scale(1.05) rotate(3deg);
        box-shadow: 0 0 0 12px rgb(16 185 129 / 0.2);
      }
      45% {
        transform: scale(1.08) rotate(-2deg);
      }
      60% {
        transform: scale(1.03) rotate(2deg);
      }
      100% {
        transform: scale(1) rotate(0deg);
        box-shadow: 0 0 0 0 rgb(16 185 129 / 0);
      }
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-danger:active {
      animation: shake 500ms var(--ease-out-smooth) both;
    }

    @keyframes shake {
      0%, 100% {
        transform: translateX(0);
      }
      10%, 30%, 50%, 70%, 90% {
        transform: translateX(-8px);
      }
      20%, 40%, 60%, 80% {
        transform: translateX(8px);
      }
    }

    /* 卡片演示 */
    .card-demo {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .card {
      background: white;
      border-radius: 0.75rem;
      padding: 1.5rem;
      border: 1px solid #e2e8f0;
      transition:
        transform var(--motion-base) var(--ease-momentum),
        box-shadow var(--motion-base) var(--ease-momentum),
        border-color var(--motion-base) var(--ease-out-smooth);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: #0f9488;
    }

    .card:active {
      transform: translateY(0);
      box-shadow: var(--shadow-sm);
      transition-duration: var(--motion-instant);
    }

    .card h3 {
      font-size: 1.125rem;
      margin-bottom: 0.5rem;
      color: #1e293b;
    }

    .card p {
      color: #64748b;
      font-size: 0.875rem;
    }

    /* 输入框演示 */
    .input-demo {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .input {
      padding: 0.75rem 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 0.5rem;
      font-size: 1rem;
      transition:
        border-color var(--motion-base) var(--ease-out-smooth),
        box-shadow var(--motion-base) var(--ease-spring);
    }

    .input:focus {
      outline: none;
      border-color: var(--color-primary-500);
      box-shadow: 0 0 0 4px rgba(15, 148, 136, 0.2);
    }

    /* Skeleton 演示 */
    .skeleton-demo {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .skeleton {
      background: #e2e8f0;
      border-radius: 0.5rem;
      animation: shimmer 1.5s ease-in-out infinite;
      background: linear-gradient(
        90deg,
        rgb(226 232 240 / 0) 0%,
        rgb(226 232 240 / 0.6) 20%,
        rgb(226 232 240 / 0.8) 50%,
        rgb(226 232 240 / 0.6) 80%,
        rgb(226 232 240 / 0) 100%
      );
      background-size: 200% 100%;
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }
      100% {
        background-position: 200% 0;
      }
    }

    .skeleton-line {
      height: 1rem;
      width: 100%;
    }

    .skeleton-line:nth-child(2) {
      width: 80%;
    }

    .skeleton-line:nth-child(3) {
      width: 60%;
    }

    /* Glass 演示 */
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
    }

    .glass-panel h3 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #1e293b;
    }

    .glass-panel p {
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 LiftLog 视觉效果演示</h1>

    <div class="demo-section">
      <h2>1. 按钮弹性动画</h2>
      <p>悬停时向上浮起，点击时缩小。绿色按钮点击有庆祝动画，红色按钮有抖动效果。</p>
      <div class="button-demo">
        <button class="btn btn-primary">主要按钮</button>
        <button class="btn btn-success">成功庆祝 🎉</button>
        <button class="btn btn-danger">错误抖动 ⚠️</button>
      </div>
    </div>

    <div class="demo-section">
      <h2>2. 卡片悬停效果</h2>
      <p>悬停卡片时会向上浮起并显示更大的阴影。</p>
      <div class="card-demo">
        <div class="card">
          <h3>训练记录</h3>
          <p>本周完成 5 次训练</p>
        </div>
        <div class="card">
          <h3>体重记录</h3>
          <p>当前 75.2 kg</p>
        </div>
        <div class="card">
          <h3>蛋白质</h3>
          <p>今日 120g</p>
        </div>
      </div>
    </div>

    <div class="demo-section">
      <h2>3. 输入框焦点光晕</h2>
      <p>点击输入框时会出现 4px 的青色光晕效果。</p>
      <div class="input-demo">
        <input class="input" type="text" placeholder="输入重量 (kg)">
        <input class="input" type="text" placeholder="输入次数">
      </div>
    </div>

    <div class="demo-section">
      <h2>4. Shimmer 加载动画</h2>
      <p>加载时显示闪烁的骨架屏效果。</p>
      <div class="skeleton-demo">
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line"></div>
      </div>
    </div>

    <div class="demo-section glass-panel">
      <h3>5. 玻璃态效果</h3>
      <p>这个面板使用了背景模糊和半透明效果，呈现现代的玻璃质感。</p>
    </div>
  </div>
</body>
</html>
